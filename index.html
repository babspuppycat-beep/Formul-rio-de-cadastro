<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <title>Cadastro</title>
    <style>
        body {
            margin: 0%;
            padding: 0%;

        }

        footer {    

            display: flex;
            justify-content: center;
            flex-direction: row;
            align-items:baseline;

        }

        h1 {

            font-family: 'Iosevka charon';

        }

        form {
            
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;


        }
        
        .outerlabel {

            padding: 5px;
            border:1px solid #000;
            border-radius: 5px;

        }
 
        .Flexgen {
            padding: 10px;
            gap: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        #genero {

            border-radius: 5px;
            border: 1px solid #000;

        }

        a {
            padding: 5px;
            border: 1px solid #000;
            border-radius: 10px;
            width: fit-content;
            height: auto;
            transition: transform 1s;

        }

        a:hover {
            transform:scale(1.25);


        }

        

    </style>
</head>
<body>

    <header class="Flexgen">
        <h1>Preencha os campos para completar o seu Cadastro</h1>
    </header>
    <!--Cadastro-->
    <main >
        <form action="" method="post">
            <label for="Nome" class="outerlabel"> 
                Seu nome
                <input type="text" name="Nome" id="Nome" required>
            </label>
            <label for="email"  class="outerlabel">
                Seu melhor email
                <input type="email" name="email" id="email" required>
            </label>
            <label for="Senha" class="outerlabel">
                Digite sua Senha
                <input type="password" name="senha" id="senha" required>
            </label>
            <label for="Birthdate" class="outerlabel">
                Sua data de nascimento
                <input type="date" name="Data de nascimento" id="Birthdate" required>
            </label>
            <!--Formulário de Gênero-->
            <div class="Flexgen" id="genero"> com qual gênero você se identifica?
                <label for="Masculino">
                    Masculino
                    <input type="radio" name="gender" id="Masculino" value="M"  required> 
                </label>
                <label for="Feminino">
                    Feminino
                    <input type="radio" name="gender" id="Feminino" value="F"   required>
                </label>
                <label for="naoBinario">
                    Não-Binário
                    <input type="radio" name="gender" id="naoBinario" value="NB" required>
                </label>
            </div>
              <label for="Termos" class="outerlabel">
                Li e concordo com os termos de serviço
                <input type="checkbox" name="Termos" id="Termos">
              </label>
            <button type="Submit" > registrar</button>
        </form>
    </main>
    <footer>
        <a href="https://github.com/babspuppycat-beep" >By babspuppycat-beep</a>
    </footer>
</body>
</html>
